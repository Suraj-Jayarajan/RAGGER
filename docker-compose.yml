services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ragger
      POSTGRES_PASSWORD: ragger_password
      POSTGRES_DB: ragger_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ragger_redis_password
    command: ["redis-server", "--requirepass", "ragger_redis_password"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -a \"ragger_redis_password\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__STORAGE__PATH: /qdrant/storage
      QDRANT__DATABASE__WAL_DIR: /qdrant/wal
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_wal:/qdrant/wal
    ports:
      - "6333:6333"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://ragger:ragger_password@postgres:5432/ragger_db
      SECRET_KEY: supersecretkey
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
    volumes:
      - ./apps/backend:/app

volumes:
  postgres_data:
  redis_data:
  qdrant_storage:
  qdrant_wal:
