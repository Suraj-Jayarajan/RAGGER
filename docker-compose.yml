services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-RAGGER}
      API_VERSION: ${API_VERSION:-0.1.0}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ragger:ragger_password@postgres:5432/ragger_db}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./apps/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-15-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragger_password}
      POSTGRES_DB: ${POSTGRES_DB:-ragger_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:${REDIS_IMAGE_TAG:-7-alpine}
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-ragger_redis_password}
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:${QDRANT_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__PATH: /qdrant/storage
      QDRANT__DATABASE__WAL_DIR: /qdrant/wal
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_wal:/qdrant/wal
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  qdrant_storage:
  qdrant_wal:
